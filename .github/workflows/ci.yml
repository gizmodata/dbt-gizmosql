name: dbt-gizmosql-ci

on:
  workflow_dispatch:
  push:

jobs:
  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing to PyPi
      contents: write  # Required for creating GitHub releases
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      # Run your tests
      - name: Run tests
        run: |
          pytest

      - name: Install pypa/build
        run: >-
          python -m
          pip install
          build
          --user

      - name: Build a binary wheel and a source tarball
        run: >-
          python -m
          build
          --sdist
          --wheel
          --outdir dist/
          .

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish distribution 📦 to PyPI
        if: startsWith(github.ref, 'refs/tags')
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Extract changelog section for this tag
        id: changelog
        if: startsWith(github.ref, 'refs/tags')
        run: |
          # Strip the leading 'v' from the tag (refs/tags/v1.2.3 -> 1.2.3).
          version="${GITHUB_REF_NAME#v}"

          # Slice CHANGELOG.md from the matching "## vX.Y.Z " header up to
          # the next "## v" header, exclusive of both. `index($0, header)`
          # avoids regex-escaping dots in the version; the trailing space
          # in `header` means "## v1.11.1" won't accidentally match a
          # request for v1.11.14.
          notes=$(awk -v header="## v${version} " '
            index($0, header) == 1 { p=1; next }
            p && /^## v/ { exit }
            p { print }
          ' CHANGELOG.md)

          # Trim leading/trailing blank lines.
          notes=$(printf '%s\n' "$notes" | awk '
            NF { found=1 }
            found { buf = buf $0 ORS }
            END {
              sub(/\n+$/, "", buf)
              print buf
            }
          ')

          {
            echo "notes<<CHANGELOG_EOF"
            if [ -n "$notes" ]; then
              echo "$notes"
            else
              echo "_No CHANGELOG.md entry found for \`v${version}\`._"
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags')
        uses: softprops/action-gh-release@v2
        with:
          # Hybrid release notes: the curated CHANGELOG.md section for this
          # tag goes at the top; the auto-generated list of PRs/commits
          # since the previous tag is appended below by
          # `generate_release_notes: true`.
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          files: dist/*
